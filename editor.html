<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>editor — りさこっこ</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FDFCFA;
  --bg2: #F7F4F0;
  --ink: #1A1714;
  --ink-mid: #5C5650;
  --ink-light: #A09890;
  --line: #E8E2DA;
  --accent: #7BAF8A;
  --accent-dark: #5A9070;
  --red: #C0624A;
  --font-serif: 'Libre Baskerville', serif;
  --font-main: 'Zen Maru Gothic', sans-serif;
}
body {
  background: var(--bg2);
  color: var(--ink);
  font-family: var(--font-main);
  font-weight: 300;
  min-height: 100vh;
}

/* PASSWORD */
.pw-screen {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
}
.pw-screen.hidden { display: none; }
.pw-box { text-align: center; }
.pw-title {
  font-family: var(--font-serif); font-size: 18px; font-weight: 400;
  letter-spacing: 0.08em; color: var(--ink); margin-bottom: 6px;
}
.pw-sub {
  font-size: 12px; color: var(--ink-light);
  letter-spacing: 0.1em; margin-bottom: 28px;
}
.pw-input {
  font-family: var(--font-main); font-size: 14px;
  padding: 10px 16px; border: 1px solid var(--line);
  border-radius: 8px; background: var(--bg2);
  color: var(--ink); outline: none;
  width: 240px; display: block; margin: 0 auto 12px;
  text-align: center; letter-spacing: 0.2em;
}
.pw-input:focus { border-color: var(--accent); }
.pw-error {
  font-size: 12px; color: var(--red);
  letter-spacing: 0.08em; margin-top: 8px;
  min-height: 18px;
}

/* HEADER */
header {
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  padding: 0 28px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.header-logo { font-family: var(--font-serif); font-size: 12px; color: var(--ink-light); letter-spacing: 0.1em; }
.header-sep { color: var(--line); }
.header-title { font-size: 12px; letter-spacing: 0.12em; color: var(--ink-mid); }
.header-right { display: flex; gap: 8px; align-items: center; }

/* BUTTONS */
.btn {
  font-family: var(--font-main);
  font-size: 12px; letter-spacing: 0.08em;
  padding: 6px 14px; border-radius: 6px;
  border: 1px solid var(--line);
  background: var(--bg); color: var(--ink-mid);
  cursor: pointer; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 5px;
}
.btn:hover { background: var(--bg2); color: var(--ink); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); color: #fff; }
.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line); display: inline-block; flex-shrink: 0; }
.status-dot.ok { background: var(--accent); }
.status-dot.ng { background: var(--red); }

/* LAYOUT */
.app { display: flex; height: calc(100vh - 54px); overflow: hidden; }

.sidebar-tabs {
  display: flex; border-bottom: 1px solid var(--line);
}
.sidebar-tab {
  flex: 1; font-family: var(--font-main); font-size: 11px;
  letter-spacing: 0.1em; color: var(--ink-light);
  background: var(--bg2); border: none; border-bottom: 2px solid transparent;
  padding: 10px 0; cursor: pointer; transition: all 0.15s;
}
.sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--bg); }
.sidebar-tab:hover { color: var(--ink); }

/* SIDEBAR */
.sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--bg); border-right: 1px solid var(--line);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-header {
  padding: 12px 16px; border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-label { font-size: 10px; letter-spacing: 0.2em; color: var(--ink-light); text-transform: uppercase; }
.post-list-wrap { flex: 1; overflow-y: auto; }
.post-list-item {
  padding: 12px 16px; border-bottom: 1px solid var(--line);
  cursor: pointer; transition: background 0.15s;
  border-left: 3px solid transparent;
}
.post-list-item:hover { background: var(--bg2); }
.post-list-item.active { background: var(--bg2); border-left-color: var(--accent); }
.post-list-date { font-size: 10px; color: var(--ink-light); letter-spacing: 0.08em; margin-bottom: 3px; }
.post-list-title { font-size: 12px; letter-spacing: 0.06em; color: var(--ink); line-height: 1.5; }

/* EDITOR AREA */
.editor-wrap { flex: 1; overflow-y: auto; padding: 28px 32px; min-width: 0; }
.editor-inner { max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

/* FIELDS */
.field-group { background: var(--bg); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
.field-label {
  font-size: 10px; letter-spacing: 0.2em; color: var(--ink-light);
  text-transform: uppercase; padding: 8px 14px 6px;
  border-bottom: 1px solid var(--line); background: var(--bg2);
}
.field-input {
  font-family: var(--font-main); font-size: 14px; font-weight: 400;
  letter-spacing: 0.06em; color: var(--ink); background: var(--bg);
  border: none; outline: none; width: 100%; padding: 11px 14px;
  resize: none; line-height: 1.8;
}
.field-input::placeholder { color: var(--ink-light); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* THUMBNAIL */
.thumb-area { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.thumb-drop {
  border: 1.5px dashed var(--line); border-radius: 6px; padding: 20px;
  text-align: center; cursor: pointer; transition: all 0.15s;
  color: var(--ink-light); font-size: 12px; letter-spacing: 0.08em; line-height: 2;
}
.thumb-drop:hover, .thumb-drop.drag-over { border-color: var(--accent); background: rgba(123,175,138,0.06); color: var(--accent); }
.thumb-drop input { display: none; }
.thumb-preview { display: none; gap: 12px; align-items: flex-start; }
.thumb-preview.show { display: flex; }
.thumb-img { width: 110px; height: 80px; object-fit: cover; border-radius: 4px; border: 1px solid var(--line); }
.thumb-name { font-size: 12px; color: var(--ink-mid); margin-bottom: 4px; }
.thumb-path { font-size: 11px; color: var(--ink-light); font-family: monospace; margin-bottom: 8px; }

/* QUILL EDITOR */
.quill-wrap { background: var(--bg); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
.quill-label {
  font-size: 10px; letter-spacing: 0.2em; color: var(--ink-light);
  text-transform: uppercase; padding: 8px 14px 6px;
  border-bottom: 1px solid var(--line); background: var(--bg2);
  display: flex; align-items: center; justify-content: space-between;
}
.img-insert-btn {
  font-size: 11px; letter-spacing: 0.08em; color: var(--ink-mid);
  background: none; border: 1px solid var(--line); border-radius: 4px;
  padding: 3px 10px; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.img-insert-btn:hover { background: var(--bg2); color: var(--ink); }
#imgBodyInput { display: none; }

/* Quill overrides */
.ql-toolbar.ql-snow {
  border: none !important;
  border-bottom: 1px solid var(--line) !important;
  background: var(--bg2);
  padding: 8px 10px !important;
}
.ql-container.ql-snow {
  border: none !important;
  font-family: var(--font-main) !important;
  font-size: 14px !important;
}
.ql-editor {
  min-height: 320px;
  padding: 16px 14px !important;
  line-height: 2 !important;
  letter-spacing: 0.06em;
  color: var(--ink) !important;
}
.ql-editor h2 {
  font-family: var(--font-main) !important;
  font-size: 18px !important;
  font-weight: 500 !important;
  letter-spacing: 0.08em !important;
  margin: 20px 0 8px !important;
  color: var(--ink) !important;
}
.ql-editor h3 {
  font-family: var(--font-main) !important;
  font-size: 15px !important;
  font-weight: 500 !important;
  letter-spacing: 0.08em !important;
  margin: 16px 0 6px !important;
  color: var(--ink) !important;
}
.ql-editor p { margin-bottom: 4px !important; }
.ql-editor img { max-width: 100% !important; border-radius: 4px; margin: 12px 0; display: block; }
.ql-editor.ql-blank::before { color: var(--ink-light) !important; font-style: normal !important; letter-spacing: 0.06em; }

/* PREVIEW */
.preview-wrap {
  width: 440px; flex-shrink: 0;
  border-left: 1px solid var(--line); background: var(--bg);
  display: flex; flex-direction: column; overflow: hidden;
}
.preview-wrap.hidden { display: none; }
.preview-header {
  padding: 10px 18px; border-bottom: 1px solid var(--line);
  font-size: 10px; letter-spacing: 0.2em; color: var(--ink-light);
  text-transform: uppercase; background: var(--bg2);
}
.preview-body { flex: 1; overflow-y: auto; padding: 36px 36px; }
.preview-body .p-meta {
  font-size: 11px; letter-spacing: 0.14em; color: var(--ink-light);
  margin-bottom: 14px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
}
.preview-body .p-tag {
  font-size: 10px; letter-spacing: 0.1em; color: var(--accent);
  border: 1px solid var(--accent); padding: 1px 8px; border-radius: 99px; opacity: 0.8;
}
.preview-body .p-title {
  font-family: var(--font-serif); font-size: 20px; font-weight: 400;
  letter-spacing: 0.04em; line-height: 1.6; margin-bottom: 24px;
  padding-bottom: 18px; border-bottom: 1px solid var(--line); color: var(--ink);
}
.preview-body .p-thumb {
  width: 100%; max-height: 240px; object-fit: cover;
  border-radius: 2px; margin-bottom: 20px;
}
.preview-body .p-body {
  font-size: 14px; line-height: 2.1; letter-spacing: 0.055em; color: var(--ink);
}
.preview-body .p-body h2 {
  font-size: 17px; font-weight: 500; letter-spacing: 0.08em;
  margin: 20px 0 8px; color: var(--ink);
}
.preview-body .p-body h3 {
  font-size: 14px; font-weight: 500; letter-spacing: 0.08em;
  margin: 16px 0 6px; color: var(--ink);
}
.preview-body .p-body img { max-width: 100%; border-radius: 4px; margin: 12px 0; display: block; }

/* MODAL */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(26,23,20,0.45); backdrop-filter: blur(4px);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--bg); border-radius: 10px; padding: 32px 36px;
  width: 460px; max-width: 92vw; animation: fadeUp 0.25s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.modal-title { font-family: var(--font-serif); font-size: 17px; font-weight: 400; letter-spacing: 0.06em; margin-bottom: 6px; }
.modal-desc { font-size: 12px; color: var(--ink-mid); letter-spacing: 0.06em; line-height: 1.8; margin-bottom: 22px; }
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 10px; letter-spacing: 0.18em; color: var(--ink-light); text-transform: uppercase; margin-bottom: 6px; }
.modal-field input {
  font-family: var(--font-main); font-size: 13px; width: 100%;
  padding: 9px 12px; border: 1px solid var(--line); border-radius: 6px;
  background: var(--bg2); color: var(--ink); outline: none;
}
.modal-field input:focus { border-color: var(--accent); }
.modal-field .hint { font-size: 11px; color: var(--ink-light); margin-top: 4px; line-height: 1.7; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }

/* TOAST */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--ink); color: #fff; font-size: 13px;
  letter-spacing: 0.08em; padding: 11px 22px; border-radius: 99px;
  opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 300;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--accent-dark); }
.toast.error { background: var(--red); }
</style>
</head>
<body>

<!-- PASSWORD -->
<div class="pw-screen" id="pwScreen">
  <div class="pw-box">
    <p class="pw-title">りさこっこ editor</p>
    <p class="pw-sub">パスワードを入力してください</p>
    <input class="pw-input" type="password" id="pwInput" placeholder="••••••••"
      onkeydown="if(event.key==='Enter') checkPassword()">
    <button class="btn btn-primary" onclick="checkPassword()" style="margin:0 auto;">入る</button>
    <p class="pw-error" id="pwError"></p>
  </div>
</div>

<header>
  <div class="header-left">
    <span class="header-logo">りさこっこ</span>
    <span class="header-sep">/</span>
    <span class="header-title">editor</span>
  </div>
  <div class="header-right">
    <span id="statusDot" class="status-dot" title="GitHub接続状態"></span>
    <button class="btn" onclick="openSettings()">⚙ 設定</button>
    <button class="btn" onclick="togglePreview()">👁 プレビュー</button>
    <button class="btn" onclick="newPost()">＋ 新規</button>
    <button class="btn" id="draftBtn" onclick="saveDraft()">💾 下書き保存</button>
    <button class="btn btn-primary" id="publishBtn" onclick="publish()">↑ GitHubへ公開</button>
  </div>
</header>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" id="tabPosts" onclick="switchTab('posts')">公開済み</button>
      <button class="sidebar-tab" id="tabDrafts" onclick="switchTab('drafts')">下書き</button>
    </div>
    <div class="sidebar-header">
      <span class="sidebar-label" id="sidebarLabel">記事一覧</span>
      <button class="btn btn-danger" onclick="deletePost()" style="padding:3px 10px;font-size:11px;">削除</button>
    </div>
    <div class="post-list-wrap" id="postListSidebar"></div>
  </div>

  <!-- EDITOR -->
  <div class="editor-wrap">
    <div class="editor-inner">

      <div class="field-row">
        <div class="field-group">
          <div class="field-label">公開日</div>
          <input class="field-input" type="date" id="postDate">
        </div>
        <div class="field-group">
          <div class="field-label">タグ（カンマ区切り）</div>
          <input class="field-input" type="text" id="postTags" placeholder="日常, 絵本">
        </div>
      </div>

      <div class="field-group">
        <div class="field-label">タイトル</div>
        <input class="field-input" type="text" id="postTitle" placeholder="タイトルを入力" style="font-size:17px;font-weight:500;">
      </div>

      <!-- THUMBNAIL -->
      <div class="field-group">
        <div class="field-label">サムネイル画像</div>
        <div class="thumb-area">
          <div class="thumb-drop" id="thumbDrop" onclick="document.getElementById('thumbInput').click()">
            <input type="file" id="thumbInput" accept="image/*" onchange="handleThumb(this.files[0])">
            📷 クリックまたはドラッグ＆ドロップ<br>
            <span style="font-size:11px;">images/ フォルダへアップロード</span>
          </div>
          <div class="thumb-preview" id="thumbPreview">
            <img class="thumb-img" id="thumbImg" src="" alt="">
            <div>
              <div class="thumb-name" id="thumbName"></div>
              <div class="thumb-path" id="thumbPath"></div>
              <button class="btn btn-danger" style="font-size:11px;padding:3px 9px;" onclick="clearThumb()">✕ 削除</button>
            </div>
          </div>
        </div>
      </div>

      <!-- RICH EDITOR -->
      <div class="quill-wrap">
        <div class="quill-label">
          <span>本文</span>
          <button class="img-insert-btn" onclick="document.getElementById('imgBodyInput').click()">
            📷 画像を挿入
          </button>
          <input type="file" id="imgBodyInput" accept="image/*" onchange="insertBodyImage(this.files[0])">
        </div>
        <div id="quillEditor"></div>
      </div>

    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-wrap hidden" id="previewWrap">
    <div class="preview-header">プレビュー</div>
    <div class="preview-body" id="previewBody"></div>
  </div>

</div>

<!-- SETTINGS MODAL -->
<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <p class="modal-title">GitHub 設定</p>
    <p class="modal-desc">初回のみ設定してください。情報はこのブラウザに保存されます。</p>
    <div class="modal-field">
      <label>GitHubユーザー名</label>
      <input type="text" id="cfgUser" placeholder="risakokko-rishjuly">
    </div>
    <div class="modal-field">
      <label>リポジトリ名</label>
      <input type="text" id="cfgRepo" placeholder="your-repo-name">
    </div>
    <div class="modal-field">
      <label>Personal Access Token (PAT)</label>
      <input type="password" id="cfgToken" placeholder="ghp_xxxxxxxxxxxx">
      <p class="hint">GitHub → Settings → Developer settings → Personal access tokens → Fine-grained tokens<br>「Contents」の Read and Write 権限が必要です</p>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeSettings()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
<script>
let posts = [];
let currentIndex = -1;
let thumbFile = null;
let thumbFileName = '';
let bodyImages = []; // {file, fileName, base64}
let previewVisible = false;
let quill;

// PASSWORD
const EDITOR_PASSWORD = 'tomo1026';
function checkPassword() {
  const val = document.getElementById('pwInput').value;
  if (val === EDITOR_PASSWORD) {
    document.getElementById('pwScreen').classList.add('hidden');
    sessionStorage.setItem('editor_auth', '1');
  } else {
    document.getElementById('pwError').textContent = 'パスワードが違います';
    document.getElementById('pwInput').value = '';
  }
}
// セッション中は再入力不要
if (sessionStorage.getItem('editor_auth') === '1') {
  document.getElementById('pwScreen').classList.add('hidden');
}

// INIT
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('postDate').value = new Date().toISOString().split('T')[0];

  quill = new Quill('#quillEditor', {
    theme: 'snow',
    placeholder: '本文を入力してください...',
    modules: {
      toolbar: [
        [{ header: 2 }, { header: 3 }, { header: false }],
        ['bold', 'italic', 'underline'],
        [{ list: 'ordered' }, { list: 'bullet' }],
        ['blockquote'],
        ['clean']
      ]
    }
  });

  quill.on('text-change', updatePreview);
  ['postTitle','postTags','postDate'].forEach(id => {
    document.getElementById(id).addEventListener('input', updatePreview);
  });

  setupThumbDrop();
  checkSettings();
  loadPostsFromGitHub();
});

// SETTINGS
function getSettings() {
  return {
    user: localStorage.getItem('gh_user') || '',
    repo: localStorage.getItem('gh_repo') || '',
    token: localStorage.getItem('gh_token') || '',
  };
}
function checkSettings() {
  const s = getSettings();
  document.getElementById('statusDot').className = 'status-dot ' + (s.user && s.repo && s.token ? 'ok' : 'ng');
  if (!s.user || !s.repo || !s.token) openSettings();
}
function openSettings() {
  const s = getSettings();
  document.getElementById('cfgUser').value = s.user;
  document.getElementById('cfgRepo').value = s.repo;
  document.getElementById('cfgToken').value = s.token;
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }
async function saveSettings() {
  const user = document.getElementById('cfgUser').value.trim();
  const repo = document.getElementById('cfgRepo').value.trim();
  const token = document.getElementById('cfgToken').value.trim();
  if (!user || !repo || !token) { showToast('すべて入力してください', 'error'); return; }
  localStorage.setItem('gh_user', user);
  localStorage.setItem('gh_repo', repo);
  localStorage.setItem('gh_token', token);
  closeSettings();
  checkSettings();
  showToast('設定を保存しました');
  await loadPostsFromGitHub();
}

// GITHUB API
async function ghFetch(path, options = {}) {
  const { user, repo, token } = getSettings();
  return fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, {
    ...options,
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...options.headers }
  });
}
async function getFileSha(path) {
  const res = await ghFetch(path);
  if (!res.ok) return null;
  const data = await res.json();
  return data.sha;
}
async function pushFile(path, contentBase64, message) {
  const sha = await getFileSha(path);
  const body = { message, content: contentBase64 };
  if (sha) body.sha = sha;
  const res = await ghFetch(path, { method: 'PUT', body: JSON.stringify(body) });
  return res.ok;
}

// LOAD POSTS
async function loadPostsFromGitHub() {
  const { user, repo, token } = getSettings();
  if (!user || !repo || !token) return;
  try {
    const res = await ghFetch('posts.js');
    if (!res.ok) { renderSidebar(); return; }
    const data = await res.json();
    const raw = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
    const match = raw.match(/const posts = (\[[\s\S]*?\]);/);
    if (match) posts = JSON.parse(match[1]);
    renderSidebar();
    if (posts.length > 0) selectPost(0);
  } catch(e) { renderSidebar(); }
}

// DRAFT
let currentTab = 'posts';
let drafts = [];
let currentDraftIndex = -1;

function loadDrafts() {
  try { drafts = JSON.parse(localStorage.getItem('editor_drafts') || '[]'); }
  catch(e) { drafts = []; }
}

function saveDraft() {
  loadDrafts();
  const title = document.getElementById('postTitle').value.trim() || '（タイトルなし）';
  const date = document.getElementById('postDate').value;
  const tags = document.getElementById('postTags').value;
  const content_html = quill.root.innerHTML;
  const content = quill.getText().trim();
  const thumbnail = thumbFileName;
  const savedAt = new Date().toLocaleString('ja-JP');
  const draft = { id: 'draft-' + Date.now(), title, date, tags, content_html, content, thumbnail, savedAt };
  if (currentTab === 'drafts' && currentDraftIndex >= 0) {
    draft.id = drafts[currentDraftIndex].id;
    drafts[currentDraftIndex] = draft;
  } else {
    drafts.unshift(draft);
    currentDraftIndex = 0;
  }
  localStorage.setItem('editor_drafts', JSON.stringify(drafts));
  showToast('下書きを保存しました 💾');
  if (currentTab === 'drafts') renderSidebar();
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabPosts').classList.toggle('active', tab === 'posts');
  document.getElementById('tabDrafts').classList.toggle('active', tab === 'drafts');
  document.getElementById('sidebarLabel').textContent = tab === 'posts' ? '公開済み' : '下書き';
  if (tab === 'drafts') loadDrafts();
  currentIndex = -1; currentDraftIndex = -1;
  renderSidebar();
}

function selectDraft(i) {
  loadDrafts();
  currentDraftIndex = i;
  const d = drafts[i];
  document.getElementById('postTitle').value = d.title === '（タイトルなし）' ? '' : d.title;
  document.getElementById('postDate').value = d.date || '';
  document.getElementById('postTags').value = d.tags || '';
  if (d.content_html) { quill.root.innerHTML = d.content_html; }
  else if (d.content) { quill.setText(d.content); }
  else { quill.setText(''); }
  thumbFile = null; thumbFileName = d.thumbnail || '';
  if (d.thumbnail) {
    document.getElementById('thumbPreview').classList.add('show');
    document.getElementById('thumbImg').src = d.thumbnail;
    document.getElementById('thumbName').textContent = d.thumbnail.replace('images/','');
    document.getElementById('thumbPath').textContent = d.thumbnail;
    document.getElementById('thumbDrop').style.display = 'none';
  } else { clearThumb(); }
  bodyImages = [];
  renderSidebar(); updatePreview();
}

// SIDEBAR
function renderSidebar() {
  const el = document.getElementById('postListSidebar');
  if (currentTab === 'drafts') {
    loadDrafts();
    if (!drafts.length) {
      el.innerHTML = '<div style="padding:20px 16px;font-size:12px;color:var(--ink-light);letter-spacing:0.08em;">下書きがありません</div>';
      return;
    }
    el.innerHTML = drafts.map((d, i) => `
      <div class="post-list-item ${i===currentDraftIndex?'active':''}" onclick="selectDraft(${i})">
        <div class="post-list-date">${d.savedAt||''} 💾</div>
        <div class="post-list-title">${d.title||'（タイトルなし）'}</div>
      </div>
    `).join('');
    return;
  }
  if (!posts.length) {
    el.innerHTML = '<div style="padding:20px 16px;font-size:12px;color:var(--ink-light);letter-spacing:0.08em;">記事がありません</div>';
    return;
  }
  el.innerHTML = posts.map((p, i) => `
    <div class="post-list-item ${i===currentIndex?'active':''}" onclick="selectPost(${i})">
      <div class="post-list-date">${p.date||''}</div>
      <div class="post-list-title">${p.title||'（タイトルなし）'}</div>
    </div>
  `).join('');
}

function selectPost(i) {
  currentIndex = i;
  const p = posts[i];
  document.getElementById('postTitle').value = p.title || '';
  document.getElementById('postDate').value = p.date || '';
  document.getElementById('postTags').value = (p.tags||[]).join(', ');
  if (p.content_html) {
    quill.root.innerHTML = p.content_html;
  } else if (p.content) {
    quill.setText(p.content);
  } else {
    quill.setText('');
  }
  thumbFile = null;
  thumbFileName = p.thumbnail || '';
  if (p.thumbnail) {
    document.getElementById('thumbPreview').classList.add('show');
    document.getElementById('thumbImg').src = p.thumbnail;
    document.getElementById('thumbName').textContent = p.thumbnail.replace('images/','');
    document.getElementById('thumbPath').textContent = p.thumbnail;
    document.getElementById('thumbDrop').style.display = 'none';
  } else {
    clearThumb();
  }
  bodyImages = [];
  renderSidebar();
  updatePreview();
}

function newPost() {
  currentIndex = -1;
  document.getElementById('postTitle').value = '';
  document.getElementById('postDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('postTags').value = '';
  quill.setText('');
  clearThumb();
  bodyImages = [];
  renderSidebar();
  updatePreview();
}

function deletePost() {
  if (currentTab === 'drafts') {
    if (currentDraftIndex < 0) { showToast('下書きが選択されていません', 'error'); return; }
    if (!confirm('この下書きを削除しますか？')) return;
    loadDrafts();
    drafts.splice(currentDraftIndex, 1);
    localStorage.setItem('editor_drafts', JSON.stringify(drafts));
    currentDraftIndex = -1; newPost(); renderSidebar(); return;
  }
  if (currentIndex < 0) { showToast('記事が選択されていません', 'error'); return; }
  if (!confirm('この記事を削除しますか？')) return;
  posts.splice(currentIndex, 1);
  currentIndex = posts.length > 0 ? 0 : -1;
  if (currentIndex >= 0) selectPost(0); else newPost();
}

// THUMBNAIL
function handleThumb(file) {
  if (!file) return;
  thumbFile = file;
  thumbFileName = 'images/' + file.name;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('thumbImg').src = e.target.result;
    document.getElementById('thumbPreview').classList.add('show');
    document.getElementById('thumbName').textContent = file.name;
    document.getElementById('thumbPath').textContent = thumbFileName;
    document.getElementById('thumbDrop').style.display = 'none';
    updatePreview();
  };
  reader.readAsDataURL(file);
}
function clearThumb() {
  thumbFile = null; thumbFileName = '';
  document.getElementById('thumbPreview').classList.remove('show');
  document.getElementById('thumbImg').src = '';
  document.getElementById('thumbDrop').style.display = '';
  document.getElementById('thumbInput').value = '';
  updatePreview();
}
function setupThumbDrop() {
  const zone = document.getElementById('thumbDrop');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleThumb(file);
  });
}

// INLINE IMAGE
function insertBodyImage(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const base64 = e.target.result;
    // カーソル位置に画像を挿入
    const range = quill.getSelection(true);
    quill.insertEmbed(range.index, 'image', base64);
    quill.setSelection(range.index + 1);
    // アップロード予定リストに追加
    bodyImages.push({ file, fileName: 'images/' + file.name, base64: base64.split(',')[1] });
    document.getElementById('imgBodyInput').value = '';
    updatePreview();
  };
  reader.readAsDataURL(file);
}

// PREVIEW
function togglePreview() {
  previewVisible = !previewVisible;
  document.getElementById('previewWrap').classList.toggle('hidden', !previewVisible);
  updatePreview();
}
function updatePreview() {
  if (!previewVisible) return;
  const title = document.getElementById('postTitle').value || '（タイトルなし）';
  const date = document.getElementById('postDate').value || '';
  const tags = document.getElementById('postTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const htmlContent = quill.root.innerHTML;
  const thumbEl = document.getElementById('thumbImg');
  const hasThumb = thumbEl.src && thumbEl.src !== window.location.href && thumbEl.src !== '';
  const tagsHtml = tags.map(t=>`<span class="p-tag">${t}</span>`).join(' ');
  const thumbHtml = hasThumb ? `<img class="p-thumb" src="${thumbEl.src}" alt="">` : '';
  const d = new Date(date);
  const dateStr = date ? `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}` : '';
  document.getElementById('previewBody').innerHTML = `
    <div class="p-meta"><span>${dateStr}</span>${tagsHtml}</div>
    <div class="p-title">${title}</div>
    ${thumbHtml}
    <div class="p-body">${htmlContent}</div>
  `;
}

// PUBLISH
async function publish() {
  const { user, repo, token } = getSettings();
  if (!user || !repo || !token) { openSettings(); return; }
  const title = document.getElementById('postTitle').value.trim();
  if (!title) { showToast('タイトルを入力してください', 'error'); return; }

  const btn = document.getElementById('publishBtn');
  btn.disabled = true; btn.textContent = '公開中...';

  try {
    const date = document.getElementById('postDate').value;
    const tags = document.getElementById('postTags').value.split(',').map(t=>t.trim()).filter(Boolean);
    const content_html = quill.root.innerHTML;
    // 本文テキストも保持（後方互換）
    const content = quill.getText().trim();
    const id = (date||'').replace(/-/g,'') + '-' + Math.random().toString(36).slice(2,6);

    // サムネイルアップロード
    let thumbnail = thumbFileName;
    if (thumbFile) {
      const b64 = await fileToBase64(thumbFile);
      const ok = await pushFile(`images/${thumbFile.name}`, b64, `Add image: ${thumbFile.name}`);
      if (!ok) { showToast('サムネイルのアップロードに失敗しました', 'error'); return; }
      thumbnail = `images/${thumbFile.name}`;
    }

    // 本文中の画像をアップロードし、base64をURLに置換
    let finalHtml = content_html;
    for (const img of bodyImages) {
      const ok = await pushFile(img.fileName, img.base64, `Add image: ${img.file.name}`);
      if (ok) {
        const { user, repo } = getSettings();
        const url = `https://raw.githubusercontent.com/${user}/${repo}/main/${img.fileName}`;
        finalHtml = finalHtml.replace(img.base64 ? `data:${img.file.type};base64,${img.base64}` : '', url);
      }
    }

    const post = { id, title, date, tags, thumbnail, content, content_html: finalHtml };
    if (currentIndex >= 0) {
      post.id = posts[currentIndex].id || id;
      posts[currentIndex] = post;
    } else {
      posts.unshift(post);
      currentIndex = 0;
    }

    const postsJs = 'const posts = ' + JSON.stringify(posts, null, 2) + ';\n';
    const postsBase64 = btoa(unescape(encodeURIComponent(postsJs)));
    const ok = await pushFile('posts.js', postsBase64, `Update posts: ${title}`);
    if (ok) {
      bodyImages = [];
      showToast('GitHubに公開しました 🎉', 'success');
      renderSidebar();
    } else {
      showToast('公開に失敗しました', 'error');
    }
  } catch(e) {
    showToast('エラー: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '↑ GitHubへ公開';
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(() => el.className = 'toast', 3000);
}
